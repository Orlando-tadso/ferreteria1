<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - Ferretería</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2>🏪 Ferretería</h2>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html">📊 Dashboard</a></li>
                    <li><a href="punto_venta.html">🛒 Punto de Venta</a></li>
                    <li><a href="productos.html">📦 Productos</a></li>
                    <li><a href="historial.html" class="active">📋 Historial</a></li>
                    <li><hr style="margin: 10px 0; border: none; border-top: 1px solid rgba(255,255,255,0.2);"></li>
                    <li><a href="#" onclick="logout()">🚪 Cerrar Sesión</a></li>
                </ul>
            </nav>
        </div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="header">
                <h1>Historial de Ventas</h1>
            </header>

            <div style="padding: 0 20px;">
                <div class="tarjeta">
                    <h3>Ventas Registradas</h3>
                    <table class="tabla" id="tabla-historial">
                        <thead>
                            <tr>
                                <th>Factura</th>
                                <th>Cliente</th>
                                <th>Cédula</th>
                                <th>Total</th>
                                <th>Fecha</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpo-historial"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await verificarAutenticacion();
            await cargarHistorial();
        });

        async function cargarHistorial() {
            try {
                const resultado = await api.obtenerVentas();
                const tbody = document.getElementById('cuerpo-historial');
                tbody.innerHTML = '';

                if (resultado.success && resultado.data) {
                    resultado.data.forEach(venta => {
                        const row = `
                            <tr>
                                <td>${venta.numero_factura}</td>
                                <td>${venta.cliente_nombre}</td>
                                <td>${venta.cliente_cedula}</td>
                                <td>${formatearMoneda(venta.total)}</td>
                                <td>${formatearFecha(venta.fecha_venta)}</td>
                                <td>
                                    <button class="btn btn-primary" onclick="verDetalles(${venta.id})">
                                        Ver
                                    </button>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarNotificacion('Error cargando historial', 'error');
            }
        }

        async function verDetalles(id) {
            try {
                const resultado = await api.obtenerVenta(id);
                if (resultado.success) {
                    let detalles = '<table class="tabla"><thead><tr><th>Producto</th><th>Cantidad</th><th>Precio</th><th>Subtotal</th></tr></thead><tbody>';
                    resultado.data.detalles.forEach(det => {
                        detalles += `<tr>
                            <td>${det.nombre}</td>
                            <td>${det.cantidad}</td>
                            <td>${formatearMoneda(det.precio_unitario)}</td>
                            <td>${formatearMoneda(det.subtotal)}</td>
                        </tr>`;
                    });
                    detalles += '</tbody></table>';
                    
                    alert('Venta: ' + resultado.data.numero_factura + '\nTotal: ' + formatearMoneda(resultado.data.total));
                }
            } catch (error) {
                mostrarNotificacion('Error al obtener detalles', 'error');
            }
        }

        async function logout() {
            try {
                await api.logout();
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Error en logout:', error);
            }
        }
    </script>
</body>
</html>
