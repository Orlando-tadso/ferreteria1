<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ferretería</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-container h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .demo-note {
            margin-top: 20px;
            padding: 12px;
            background-color: #e7f3ff;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            font-size: 13px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏪 Ferretería</h1>
        
        <div id="mensaje-error" class="error"></div>

        <form id="form-login" onsubmit="login(event)">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" placeholder="Ingrese su usuario" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit" id="btn-login">Iniciar Sesión</button>
        </form>

        <div class="demo-note">
            <strong>Nota:</strong> Este login es temporal. Actualmente usa el sistema de sesiones PHP. Migración a JWT en progreso.
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Redirigir si ya está autenticado
        window.addEventListener('load', async () => {
            try {
                const usuario = await api.obtenerUsuarioActual();
                if (usuario.success) {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                // No autenticado, mostrar login
            }
        });

        async function login(event) {
            event.preventDefault();

            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const error = document.getElementById('mensaje-error');

            btn.disabled = true;
            btn.textContent = 'Cargando...';
            error.classList.remove('show');

            try {
                // Enviar a login.php (sistema antiguo)
                const response = await fetch('../login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `usuario=${encodeURIComponent(usuario)}&contrasena=${encodeURIComponent(password)}&ajax=1`,
                    credentials: 'include'
                });

                const resultado = await response.json();

                if (resultado.success) {
                    // Guardar token si viene
                    if (resultado.token) {
                        api.guardarToken(resultado.token);
                    }
                    window.location.href = 'index.html';
                } else {
                    error.textContent = resultado.message || 'Usuario o contraseña incorrectos';
                    error.classList.add('show');
                }
            } catch (err) {
                console.error('Error:', err);
                error.textContent = 'Error al iniciar sesión. Intente nuevamente.';
                error.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
            }
        }
    </script>
</body>
</html>
