<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferretería - Sistema de Inventario</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2>🏪 Ferretería</h2>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html" class="active">📊 Dashboard</a></li>
                    <li><a href="punto_venta.html">🛒 Punto de Venta</a></li>
                    <li><a href="productos.html">📦 Productos</a></li>
                    <li><a href="historial.html">📋 Historial</a></li>
                    <li><hr style="margin: 10px 0; border: none; border-top: 1px solid rgba(255,255,255,0.2);"></li>
                    <li><a href="#" onclick="logout()">🚪 Cerrar Sesión</a></li>
                </ul>
            </nav>
        </div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="header">
                <h1>Bienvenido al Sistema</h1>
                <p>Última actualización: <span id="fecha-actual"></span></p>
            </header>

            <div style="padding: 0 20px;">
                <div id="estadisticas" style="margin-bottom: 30px;"></div>
                
                <div class="tarjeta">
                    <h3>Últimas Ventas</h3>
                    <table class="tabla" id="tabla-ventas">
                        <thead>
                            <tr>
                                <th>Factura</th>
                                <th>Cliente</th>
                                <th>Total</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpo-ventas"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // Verificar autenticación al cargar
        document.addEventListener('DOMContentLoaded', async () => {
            await verificarAutenticacion();
            cargarDashboard();
        });

        async function cargarDashboard() {
            try {
                // Establecer fecha actual
                document.getElementById('fecha-actual').textContent = 
                    new Date().toLocaleString('es-CO');
                
                // Cargar ventas
                const result = await api.obtenerVentas();
                if (result.success && result.data) {
                    const tbody = document.getElementById('cuerpo-ventas');
                    tbody.innerHTML = '';
                    
                    result.data.slice(0, 5).forEach(venta => {
                        const row = `
                            <tr>
                                <td>${venta.numero_factura}</td>
                                <td>${venta.cliente_nombre}</td>
                                <td>${formatearMoneda(venta.total)}</td>
                                <td>${formatearFecha(venta.fecha_venta)}</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                }
            } catch (error) {
                console.error('Error cargando dashboard:', error);
                mostrarNotificacion('Error al cargar datos', 'error');
            }
        }

        async function logout() {
            try {
                await api.logout();
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Error en logout:', error);
            }
        }
    </script>
</body>
</html>
